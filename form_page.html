<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="form_page_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Telex&display=swap" rel="stylesheet">
    <script src="form_page.js" type="module" defer></script>
    <script src="local_storage.js" type="module" defer></script>
</head>

<body>
    <div id="form-card">
        <img src="./assets/images/logo.png" alt="a dark red timer icon" id="logo">
        <p id="title">OnTimer</p>
        <p id="title-description">Master your meeting time by creating structured segments for your presentation</p>
        <div id="segments">
        </div>
        <button type="button" id="add-segment">Add Segment</button>
        <div id="total-duration-and-action-button">
            <div id="total-duration">Total Duration:
                <p id="duration"> 10 minutes</p>
            </div>
            <button type="button" id="create-timer-button">Save</button>
        </div>
        <div class="saved">
            saved
        </div>

    </div>

</body>

</html>
